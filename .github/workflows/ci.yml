name: CI

on:
  push:
  pull_request:

jobs:
  vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run verify

  visualstudio:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - run: msbuild extensions\visualstudio\EditorContextBridge2026\EditorContextBridge2026.csproj /restore /p:Configuration=Release
